packages:
  - apps/*
  - packages/*

allowBuilds:
  esbuild: true
  lefthook: true
  msgpackr-extract: true

catalog:
  "@orpc/client": ^1.14.6
  "@orpc/openapi": ^1.14.6
  "@orpc/server": ^1.14.6
  "@orpc/zod": ^1.14.6
  better-auth: ^1.6.20
  dotenv: ^17.4.2
  "@effect/sql-pg": 4.0.0-beta.85
  "@effect/vitest": 4.0.0-beta.85
  drizzle-kit: 1.0.0-rc.4
  drizzle-orm: 1.0.0-rc.4
  effect: 4.0.0-beta.85
  hono: ^4.12.27
  tsdown: ^0.22.3
  typescript: 6.0.3
  zod: ^4.4.3

minimumReleaseAgeExclude:
  - "@base-ui/react@1.6.0"
  - "@base-ui/utils@0.3.1"
  - pg-connection-string@2.14.0
  - pg-protocol@1.15.0
  - pg@8.22.0

onlyBuiltDependencies:
  - esbuild
  - msgpackr-extract
