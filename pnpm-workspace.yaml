  "@orpc/openapi": ^1.14.6
  "@orpc/server": ^1.14.6
  "@orpc/zod": ^1.14.6
  better-auth: ^1.6.20
  dotenv: ^17.4.2
  drizzle-orm: ^0.45.2
  hono: ^4.12.27
