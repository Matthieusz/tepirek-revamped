name: tepirek-revamped-test

services:
  postgres:
    image: postgres:16
    container_name: tepirek-revamped-test-postgres
    environment:
      POSTGRES_DB: tepirek-revamped-test
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tepirek-revamped-test"]
      interval: 1s
      timeout: 5s
      retries: 30
