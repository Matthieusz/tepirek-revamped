name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tepirek_revamped_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm check

      - name: Unused-code check
        run: pnpm check:unused

      - name: Typecheck
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Smoke tests
        run: pnpm test:smoke

      - name: API integration tests
        run: pnpm test:integration
        env:
          API_INTEGRATION_ALLOW_DATABASE_RESET: "1"
          TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/tepirek_revamped_test

      - name: Build
        run: pnpm build
